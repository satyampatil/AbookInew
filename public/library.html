<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Library - abooki Premium</title>
    <link rel="icon" href="browserIcon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Combined Font Import: Inter for UI, Playfair Display for Editorial Headings -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <style>
        /* ---
        // ===============================================
        //   00. OVERLAYS
        // ===============================================
        // --- */
        .site-noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99998;
            opacity: 0.45;
            background-image:
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.02) 0 1px, transparent 1px 3px),
                repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.015) 0 1px, transparent 1px 4px);
            mix-blend-mode: overlay;
        }

        /* Toast Notifications */
        .site-toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(16, 16, 18, 0.95); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 1rem 2rem; border-radius: 100px;
            font-family: var(--font-ui); font-weight: 500; font-size: 0.9rem;
            z-index: 99999; opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .site-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .site-toast.error { border-color: #e14c3a; color: #e14c3a; }
        .site-toast.success { border-color: var(--accent-green); color: var(--accent-green); }

        /* ---
        // ===============================================
        //   01. GLOBAL STYLES, CURSOR, & EDITORIAL PALETTE
        // ===============================================
        // --- */
        :root {
            --bg-color: #070708; 
            --bg-surface: #101012;
            --text-main: #f0ece1;
            --text-muted: #8e8b82;
            --accent-gold: #c9a05b;
            --accent-green: #588157;
            --border-subtle: rgba(240, 236, 225, 0.08);
            --font-ui: 'Inter', sans-serif;
            --font-editorial: 'Playfair Display', serif;
            --logo-star-rotate: 0deg;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: var(--font-ui); line-height: 1.6;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden; cursor: auto;
        }

        @media (pointer: fine) {
            body { cursor: none; }
            a, button, input, textarea, select, .clickable, .magnetic { cursor: none; }
            #cursor-dot, #cursor-outline {
                position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
                border-radius: 50%; pointer-events: none; z-index: 9999999;
            }
            #cursor-dot {
                width: 6px; height: 6px; background-color: var(--text-main);
                transition: transform 0.2s cubic-bezier(0.165, 0.84, 0.44, 1), background-color 0.2s;
            }
            #cursor-outline {
                width: 40px; height: 40px; border: 1px solid rgba(240, 236, 225, 0.3);
                transition: width 0.3s cubic-bezier(0.165, 0.84, 0.44, 1), height 0.3s cubic-bezier(0.165, 0.84, 0.44, 1), border-color 0.3s, background-color 0.3s;
            }
            body.cursor-hover #cursor-dot { transform: translate(-50%, -50%) scale(0.1); }
            body.cursor-hover #cursor-outline {
                width: 60px; height: 60px; border-color: var(--accent-gold);
                background-color: rgba(201, 160, 91, 0.05); backdrop-filter: blur(2px);
            }
        }
        @media (pointer: coarse) { #cursor-dot, #cursor-outline { display: none !important; } }

        .magnetic { display: inline-block; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); will-change: transform; }
        .fade-up { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        a { color: inherit; text-decoration: none; } ul { list-style: none; } img { max-width: 100%; height: auto; display: block; }
        main { flex-grow: 1; }

        /* ---
        // ===============================================
        //   02. DUAL NAVIGATION SYSTEM
        // ===============================================
        // --- */
        .desktop-header-wrapper {
            position: fixed; top: 1.5rem; left: 0; width: 100%;
            z-index: 1000; display: flex; justify-content: center;
            padding: 0 1.5rem; pointer-events: none; 
        }
        .main-nav {
            pointer-events: auto; display: flex; align-items: center; justify-content: space-between;
            width: 100%; max-width: 1200px; height: 64px; background: rgba(16, 16, 18, 0.65);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border-subtle);
            border-radius: 100px; padding: 0 1.5rem 0 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: all 0.3s ease;
        }
        .logo { font-family: var(--font-editorial); font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; position: relative; color: var(--text-main); }
        .logo::after {
            content: "*"; position: absolute; right: -0.3em; top: -0.2em; font-family: var(--font-ui); font-size: 0.6em; color: var(--accent-gold);
            transform: rotate(var(--logo-star-rotate)); transition: transform 0.1s linear;
        }
        .nav-links { display: flex; align-items: center; gap: 2rem; margin: 0 auto; }
        .nav-link {
            display: inline-flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); transition: color 0.3s ease; position: relative; padding: 0.5rem 0; 
        }
        .nav-link:hover, .nav-link.active { color: var(--text-main); }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background-color: var(--accent-gold);
        }
        .nav-link-anim { display: inline-flex; align-items: center; } 
        .nav-link-anim .ai-part, .nav-link-anim .i-part { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link-anim .book-part {
            display: inline-flex; align-items: center; max-width: 0; opacity: 0; transform: translateX(-10px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); color: var(--accent-gold); font-weight: 500; overflow: hidden; white-space: nowrap; 
        }
        .nav-link-anim:hover .book-part, .nav-link-anim.active .book-part { max-width: 80px; opacity: 1; transform: translateX(0); margin: 0 0.05em; }

        .nav-profile {
            position: relative; height: 40px; width: 40px; border-radius: 50%; border: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.3s;
        }
        .nav-profile:hover { border-color: var(--accent-gold); }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .nav-dropdown {
            display: none; position: absolute; top: 100%; right: 0; background: rgba(16, 16, 18, 0.95);
            backdrop-filter: blur(10px); min-width: 180px; border-radius: 12px; border: 1px solid var(--border-subtle); padding: 0.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1001;
        }
        .nav-profile:hover .nav-dropdown { display: block; }
        .dropdown-item {
            display: block; padding: 0.75rem 1rem; color: var(--text-muted); font-size: 0.85rem; font-weight: 500; border-radius: 8px; transition: all 0.2s;
        }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

        .mobile-header-wrapper {
            display: none; position: fixed; top: 0; left: 0; width: 100%; z-index: 2010;
            background: rgba(7, 7, 8, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle);
            padding: 1rem 1.5rem; justify-content: space-between; align-items: center; transition: background 0.3s ease, border-color 0.3s ease, backdrop-filter 0.3s ease;
        }
        .mobile-header-wrapper.menu-open { background: transparent; backdrop-filter: none; border-bottom-color: transparent; }
        .hamburger { width: 30px; height: 20px; position: relative; cursor: pointer; z-index: 2012; }
        .hamburger span {
            display: block; position: absolute; height: 2px; width: 100%; background: var(--text-main);
            border-radius: 2px; opacity: 1; left: 0; transform: rotate(0deg); transition: .25s ease-in-out;
        }
        .hamburger span:nth-child(1) { top: 0px; } .hamburger span:nth-child(2) { top: 9px; } .hamburger span:nth-child(3) { top: 18px; }
        .hamburger.open span:nth-child(1) { top: 9px; transform: rotate(135deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; left: -20px; }
        .hamburger.open span:nth-child(3) { top: 9px; transform: rotate(-135deg); }
        
        .mobile-menu-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2005; background: #050506;
            background-image: radial-gradient(circle at 50% 0%, rgba(201, 160, 91, 0.12) 0%, transparent 70%); display: flex; flex-direction: column; justify-content: center; align-items: center; transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .mobile-menu-overlay.active { transform: translateY(0); }
        .mobile-nav-links { display: flex; flex-direction: column; gap: 2.5rem; text-align: center; width: 100%; }
        .mobile-nav-links li { overflow: hidden; }
        .mobile-nav-link {
            font-family: var(--font-editorial); font-size: 3rem; color: var(--text-muted); transition: color 0.3s ease; display: inline-block; transform: translateY(100%); opacity: 0; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }
        .mobile-nav-link.active, .mobile-nav-link:hover { color: var(--text-main); }
        .mobile-nav-link::before {
            content: attr(data-num); font-family: var(--font-ui); font-size: 0.9rem; vertical-align: super; margin-right: 15px; color: var(--accent-gold); opacity: 0.6;
        }
        .mobile-menu-overlay.active .mobile-nav-link { transform: translateY(0); opacity: 1; }
        .mobile-menu-overlay.active li:nth-child(1) .mobile-nav-link { transition-delay: 0.1s; }
        .mobile-menu-overlay.active li:nth-child(2) .mobile-nav-link { transition-delay: 0.2s; }
        .mobile-menu-overlay.active li:nth-child(3) .mobile-nav-link { transition-delay: 0.3s; }
        .mobile-menu-overlay.active li:nth-child(4) .mobile-nav-link { transition-delay: 0.4s; }
        .mobile-profile-container { margin-top: 4rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; transform: translateY(20px); opacity: 0; transition: transform 0.6s ease 0.5s, opacity 0.6s ease 0.5s;  width: auto; height: auto; border: 0; min-width: 180px;}
        .mobile-menu-overlay.active .mobile-profile-container { transform: translateY(0); opacity: 1;  width: auto; height: auto; border: 0; min-width: 180px;}
        .mobile-profile-container > .profile-avatar { width: 48px; height: 48px; flex: 0 0 auto; }
        .mobile-profile-container .mobile-profile-actions { text-align: center; }
        .mobile-profile-container .mobile-profile-link { display: block; margin-bottom: 0.8rem; font-family: var(--font-ui); font-size: 1.05rem; line-height: 1.2; color: var(--text-main); }
        .mobile-profile-container .mobile-profile-link::before { content: none; }
        @media (max-width: 900px) { .desktop-header-wrapper { display: none; } .mobile-header-wrapper { display: flex; } .mobile-menu-overlay { justify-content: flex-start; overflow-y: auto; padding: clamp(5.5rem, 12vh, 7rem) 1.5rem 2rem; } .mobile-nav-links { gap: clamp(1.15rem, 4.2vh, 2rem); } .mobile-nav-link { font-size: clamp(2rem, 9vw, 2.85rem); line-height: 1.05; } .mobile-profile-container { margin-top: clamp(1.5rem, 5vh, 3rem); gap: 0.75rem; } .mobile-profile-container > .profile-avatar { width: 46px; height: 46px; } }


        /* ---
        // ===============================================
        //   03. CENTRAL LIBRARY SPECIFIC STYLES
        // ===============================================
        // --- */
        .library-container {
            position: relative;
            width: 100%; 
            height: 100vh; 
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .library-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(7, 7, 8, 0.7), rgba(7, 7, 8, 0.9)), url('image_f07d9a.jpg');
            background-size: cover; background-position: center; z-index: 0;
            filter: grayscale(0.5);
        }

        /* FIX: Bulletproof horizontal centering */
        .library-overlay {
            position: absolute; 
            top: 120px; 
            left: 0;
            right: 0;
            width: 100%;
            text-align: center; 
            z-index: 10; 
            color: var(--text-main);
            text-shadow: 0 4px 20px rgba(0,0,0,0.8); 
            pointer-events: none; 
        }

        .library-overlay h1 {
            font-family: var(--font-editorial); font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 400; margin-bottom: 0.5rem; line-height: 1.1;
        }

        .library-overlay p {
            font-family: var(--font-ui); font-size: 1.1rem; color: var(--accent-gold);
            text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500;
        }

        #avatar-playground {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none; 
        }

        .floating-avatar {
            position: absolute; width: 80px; height: 80px; pointer-events: auto; 
            cursor: pointer; will-change: top, left; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            z-index: 20;
        }

        .floating-avatar img {
            width: 100%; height: 100%; object-fit: contain;
            animation: float-bob 4s ease-in-out infinite;
        }

        @keyframes float-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .avatar-tooltip {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(10px);
            background: rgba(16, 16, 18, 0.95); border: 1px solid var(--accent-gold);
            color: var(--text-main); padding: 12px 16px; border-radius: 12px;
            width: max-content; max-width: 220px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); opacity: 0; visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;
            font-size: 0.9rem; z-index: 30; backdrop-filter: blur(10px);
        }

        .avatar-tooltip::after {
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -6px;
            border-width: 6px; border-style: solid;
            border-color: var(--accent-gold) transparent transparent transparent;
        }

        .avatar-tooltip strong { display: block; color: var(--accent-gold); margin-bottom: 4px; font-weight: 600; }
        .avatar-tooltip em { display: block; font-size: 0.85rem; color: var(--text-muted); font-style: italic; }

        .floating-avatar:hover { z-index: 40; }
        .floating-avatar:hover .avatar-tooltip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-15px); }


        /* --- MUSIC PLAYER WIDGET (Premium Theme) --- */
        /* FIX: Reverted padding and width/height to old reliable numbers to prevent svg clipping */
        .music-player-widget {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(16, 16, 18, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color: var(--text-main); font-family: var(--font-ui); border-radius: 50px;
            
            width: 60px; height: 60px; padding-left: 9px; padding-top: 4px; overflow: hidden;
            
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column;
        }

        .music-player-widget:hover {
            width: 260px; height: auto; min-height: 120px; border-radius: 20px; padding: 20px;
            background: rgba(16, 16, 18, 0.95); border-color: var(--accent-gold);
        }

        .music-header { display: flex; align-items: center; gap: 15px; width: 100%; margin-bottom: 0; transition: margin-bottom 0.3s; }
        .music-player-widget:hover .music-header { margin-bottom: 15px; }

        .music-disc {
            width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
            animation: spin 5s linear infinite; animation-play-state: paused; cursor: pointer;
        }
        
        .music-info-controls {
            display: flex; flex-direction: column; flex-grow: 1; opacity: 0; transform: translateX(-10px); transition: all 0.6s ease; white-space: nowrap;
        }
        .music-player-widget:hover .music-info-controls { opacity: 1; transform: translateX(0); }

        .music-song-name { font-size: 0.9rem; font-weight: 600; max-width: 150px; overflow: hidden; text-overflow: ellipsis; color: var(--accent-gold); }
        .music-controls { display: flex; gap: 12px; margin-top: 6px; }
        .music-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; transition: color 0.2s; }
        .music-btn:hover { color: var(--text-main); }
        .music-btn svg { width: 18px; height: 18px; }

        .music-playlist {
            opacity: 0; height: 0; pointer-events: none; transition: all 0.3s ease;
            display: flex; flex-direction: column; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0;
        }
        .music-player-widget:hover .music-playlist { opacity: 1; height: auto; pointer-events: auto; padding-top: 15px; }

        .playlist-item { font-size: 0.85rem; color: var(--text-muted); cursor: pointer; padding: 6px 10px; border-radius: 6px; transition: all 0.2s; }
        .playlist-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .playlist-item.active { color: var(--accent-gold); font-weight: 600; background: rgba(201, 160, 91, 0.1); }

        .music-player-widget.playing .music-disc { animation-play-state: running; }

        @media (max-width: 900px) {
            .music-player-widget { bottom: 20px; left: 20px; }
            .library-overlay { top: 100px; }
        }

        @media (hover: none) {
            .music-player-widget.expanded {
                width: 260px; height: auto; min-height: 120px; border-radius: 20px; padding: 20px;
                background: rgba(16, 16, 18, 0.95); border-color: var(--accent-gold);
            }

            .music-player-widget.expanded .music-header { margin-bottom: 15px; }
            .music-player-widget.expanded .music-info-controls { opacity: 1; transform: translateX(0); }
            .music-player-widget.expanded .music-playlist { opacity: 1; height: auto; pointer-events: auto; padding-top: 15px; }
        }
    </style>
</head>

    <script type="module">
        // --- RELIABLE DOM READY HELPER ---
        const onDOMReady = (callback) => {
            if (document.readyState !== 'loading') callback();
            else document.addEventListener('DOMContentLoaded', callback);
        };

        // --- PREMIUM INTERACTION: Custom Cursor Logic ---
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        
        if (cursorDot && cursorOutline && window.matchMedia("(pointer: fine)").matches) {
            let cursorX = 0, cursorY = 0, outlineX = 0, outlineY = 0;
            
            window.addEventListener('mousemove', (e) => {
                cursorX = e.clientX; cursorY = e.clientY;
                cursorDot.style.left = cursorX + 'px'; cursorDot.style.top = cursorY + 'px';
            });
            
            function animateCursor() {
                outlineX += (cursorX - outlineX) * 0.15; outlineY += (cursorY - outlineY) * 0.15;

                snapshot.forEach(doc => {

        function startLibraryListener() {
            console.log("Authenticated. Starting library listener...");
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'active_readers'));
            
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                const now = Date.now();
                const allReaders = [];
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    let lastSeenTime = now;
                    if (data.lastSeen && typeof data.lastSeen.toMillis === 'function') {
                        lastSeenTime = data.lastSeen.toMillis();
                    } else if (data.lastSeen === null) {
                        lastSeenTime = now; 
                    }
                    if (now - lastSeenTime <= 5 * 60 * 1000) {
                        data.lastSeenTime = lastSeenTime;
                        allReaders.push(data);
                    }
                });

                const countEl = document.querySelector('.library-overlay p');
                if (countEl) {
                    if (allReaders.length > 0) {
                        countEl.textContent = `${allReaders.length} Active Reader${allReaders.length === 1 ? '' : 's'}`;
                    } else {
                        countEl.textContent = "Waiting for readers...";
                    }
                }

                allReaders.sort((a, b) => b.lastSeenTime - a.lastSeenTime);
                const visibleReaders = allReaders.slice(0, MAX_VISIBLE_GHOSTS);
                const visibleIds = new Set(visibleReaders.map(r => r.userId));

                visibleReaders.forEach(data => {
                    if (activeGhosts.has(data.userId)) {
                        updateGhost(data.userId, data);
                    } else {
                        createGhost(data);
                    }
                });

                for (const [userId, element] of activeGhosts) {
                    if (!visibleIds.has(userId)) {
                        removeGhost(userId);
                    }
                }
            }, (error) => { console.error("Library Listener Error:", error); });
        }

            const usesTouchExpansion = window.matchMedia("(hover: none)").matches;

            if (usesTouchExpansion) {
                widget.addEventListener('click', (e) => {
                    e.stopPropagation();
                    widget.classList.add('expanded');
                });

                document.addEventListener('click', () => {
                    widget.classList.remove('expanded');

            }
            
            const updateUI = () => {
                songName.innerText = PLAYLIST[currentTrackIndex];
                if (isPlaying) {
                    playBtn.innerHTML = `<i data-feather="pause"></i>`;
                    widget.classList.add('playing');

                    playBtn.innerHTML = `<i data-feather="play"></i>`;

            disc.onclick = () => {
                if (usesTouchExpansion && !widget.classList.contains('expanded')) {

        function getHeadingExclusionRect() {
            const heading = document.querySelector('.library-overlay h1');
            const count = document.querySelector('.library-overlay p');
            if (!heading || !count) return null;

            const headingRect = heading.getBoundingClientRect();
            const countRect = count.getBoundingClientRect();
            const paddingX = 48;
            const paddingY = 36;

            return {
                left: Math.min(headingRect.left, countRect.left) - paddingX,
                right: Math.max(headingRect.right, countRect.right) + paddingX,
                top: Math.min(headingRect.top, countRect.top) - paddingY,
                bottom: Math.max(headingRect.bottom, countRect.bottom) + paddingY
            };
        }

        function intersectsRect(a, b) {
            if (!a || !b) return false;
            return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
        }

        function getSafeGhostPosition() {
            if (!playground) return { x: 10 + Math.random() * 80, y: 10 + Math.random() * 70 };

            const containerRect = playground.getBoundingClientRect();
            const exclusionRect = getHeadingExclusionRect();
            const ghostSize = 90;

            for (let attempt = 0; attempt < 40; attempt += 1) {
                const x = 10 + Math.random() * 80;
                const y = 10 + Math.random() * 70;
                const candidateRect = {
                    left: containerRect.left + (containerRect.width * x / 100),
                    right: containerRect.left + (containerRect.width * x / 100) + ghostSize,
                    top: containerRect.top + (containerRect.height * y / 100),
                    bottom: containerRect.top + (containerRect.height * y / 100) + ghostSize
                };

                if (!intersectsRect(candidateRect, exclusionRect)) {
                    return { x, y };
                }
            }

            if (exclusionRect) {
                const safeTop = ((exclusionRect.bottom - containerRect.top + 35) / containerRect.height) * 100;
                return { x: 10 + Math.random() * 80, y: Math.min(Math.max(safeTop, 32), 80) };
            }

            return { x: 10 + Math.random() * 80, y: 55 + Math.random() * 25 };
        }

        function createGhost(data) {
            const el = document.createElement('div');
            el.className = 'floating-avatar';
            
            const startPosition = getSafeGhostPosition();
            el.style.left = startPosition.x + '%';

                        bookData.isPublicView = true;
                        localStorage.setItem('generatedBook', JSON.stringify(bookData));

                        alert(`"${data.bookTitle}" is currently not available in the public archive.`);

                    console.error("Error fetching book:", error);
                    alert("Could not open book info.");
                }
            });

            if (playground) playground.appendChild(el);
            activeGhosts.set(data.userId, el);
            moveGhostRandomly(el);
        }

        function updateGhost(userId, data) {
            const el = activeGhosts.get(userId);
            if (!el) return;
            const tooltip = el.querySelector('.avatar-tooltip');
            if (tooltip) {
                tooltip.innerHTML = `
                    <strong>${data.displayName}</strong>
                    Reading: <br>
                    <em>${data.bookTitle || 'A Mystery Book'}</em>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">(Click to Join)</div>
                `;
            }
        }

        function removeGhost(userId) {
            const el = activeGhosts.get(userId);
            if (el) {
                el.style.transition = 'opacity 0.5s';
                el.style.opacity = '0';
                setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, 500);
                activeGhosts.delete(userId);
            }
        }

        function moveGhostRandomly(element) {
            if (!element.parentNode) return;
            const newPosition = getSafeGhostPosition();
            const durationSec = 15 + Math.random() * 10; 

            element.style.transition = `left ${durationSec}s ease-in-out, top ${durationSec}s ease-in-out`;
            element.style.left = newPosition.x + '%';
            element.style.top = newPosition.y + '%';

            setTimeout(() => { moveGhostRandomly(element); }, durationSec * 1000);
        }

                initAuthAndLoad();
            }
        });

        // Star rotation when scrolled
        let lastScrollY = window.scrollY;
        let rotation = 0;
        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY;
            const delta = currentScrollY - lastScrollY;
            rotation += delta * 0.5;
            document.documentElement.style.setProperty('--logo-star-rotate', `${rotation}deg`);
            lastScrollY = currentScrollY;
        });
